services:
  # =========================================
  # 1. PostgreSQL (替换原有的 MySQL)
  # =========================================
  postgres:
    image: postgres:15-alpine
    container_name: flash_monitor_postgres
    restart: always
    environment:
      POSTGRES_USER: "ZY"
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: "flash_monitor"
    ports:
      # 映射到本机的 5433 端口
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - flash_net

  # =========================================
  # 2. Redis
  # =========================================
  redis:
    image: redis:alpine
    container_name: flash_monitor_redis
    restart: always
    ports:
      # 这里用我们刚才改好的 16379，避免和你本地冲突
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - flash_net

  # =========================================
  # 3. API Service
  # =========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flash_monitor_api
    restart: always
    environment:
      - FLASH_DB_DSN=postgres://ZY:123456@postgres:5432/flash_monitor?sslmode=disable
      - ETH_RPC_MAIN=https://eth-mainnet.g.alchemy.com/v2/YOUR_KEY  # 请替换为你的 RPC
      - ENV=development
    ports:
      - "4010:4010"
    depends_on:
      - postgres
      - redis
    networks:
      - flash_net

volumes:
  pg_data:
  redis_data:

networks:
  flash_net:
    driver: bridge
