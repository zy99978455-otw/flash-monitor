<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flash Monitor - Realtime USDT</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #00ff00; padding: 20px; }
        .event { border-bottom: 1px solid #333; padding: 10px 0; }
        .tx-hash { color: #888; font-size: 0.8em; }
        .amount { color: #ffeb3b; font-weight: bold; }
        .title { color: #fff; border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1 class="title">⚡ Flash Monitor - Realtime USDT Transfers</h1>
    <div id="status">Status: Connecting...</div>
    <div id="events"></div>

    <script>
        const eventsDiv = document.getElementById('events');
        const statusDiv = document.getElementById('status');
        
        // 连接到你的 Go 服务
        const ws = new WebSocket("ws://localhost:4010/v1/ws");

        ws.onopen = () => {
            statusDiv.innerText = "Status: 🟢 Connected (Watching Ethereum Mainnet)";
            statusDiv.style.color = "#00ff00";
        };

        ws.onclose = () => {
            statusDiv.innerText = "Status: 🔴 Disconnected";
            statusDiv.style.color = "#ff0000";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const div = document.createElement('div');
            div.className = 'event';
            
            // 简单的金额单位转换 (USDT 有 6 位小数)
            const amount = (parseFloat(data.amount) / 1000000).toLocaleString();

            div.innerHTML = `
                <div>Block: #${data.block_number} | <span class="amount">$${amount} USDT</span></div>
                <div>From: ${data.from_address}</div>
                <div>To: ${data.to_address}</div>
                <div class="tx-hash">TX: ${data.tx_hash}</div>
            `;
            
            // 插入到最前面
            eventsDiv.insertBefore(div, eventsDiv.firstChild);
        };
    </script>
</body>
</html>
