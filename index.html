<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>巨鲸雷达 (FlashMonitor)</title>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: 'Courier New', Courier, monospace; padding: 30px; }
        .whale { border-bottom: 1px dashed #30363d; padding: 15px 0; animation: fadeIn 0.5s ease-in; }
        .amount { color: #3fb950; font-weight: bold; font-size: 1.5em; }
        .tx-hash { color: #8b949e; font-size: 0.9em; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<h2>🐳 FlashMonitor 巨鲸实时监控 (SSE 极速版)</h2>
<div id="status" style="color: #8b949e; margin-bottom: 20px;">正在连接服务器...</div>
<div id="radar"></div>

<script>
    // 核心：只需这 1 行代码就能建立原生 SSE 订阅！
    // ⚠️ 注意：这里的 URL 请换成你实际挂载 Broker Handler 的路由地址
    const source = new EventSource('http://localhost:4010/v1/events');

    const radar = document.getElementById('radar');
    const status = document.getElementById('status');

    source.onopen = () => {
        status.innerHTML = "🟢 已连接到 FlashMonitor 核心引擎，正在监听链上数据...";
        status.style.color = "#3fb950";
    };

    // 只要后端 Flush 一条数据，这里就会瞬间触发
    source.onmessage = function(event) {
        const data = JSON.parse(event.data);

        // 动态把巨鲸数据转换成金额，USDT有6位小数，所以除以 1,000,000
        const usdtAmount = (data.amount / 1000000).toLocaleString('en-US', { style: 'currency', currency: 'USD' });

        const div = document.createElement('div');
        div.className = 'whale';
        div.innerHTML = `
                🚨 发现巨鲸: <span class="amount">${usdtAmount}</span> <br>
                <div class="tx-hash">
                    Block: ${data.block_number} | Tx: <a href="https://etherscan.io/tx/${data.tx_hash}" target="_blank" style="color:#58a6ff">${data.tx_hash.substring(0, 15)}...</a><br>
                    From: ${data.from_address} ➡️ To: ${data.to_address}
                </div>`;

        // 把新数据像弹幕一样插到最前面
        radar.prepend(div);
        // 如果屏幕上的巨鲸超过 50 条，就把最底下老的删掉
        if (radar.children.length > 50) {
            radar.removeChild(radar.lastChild);
        }
    };

    source.onerror = function() {
        status.innerHTML = "🔴 网络断开，浏览器正在全自动疯狂重连...";
        status.style.color = "#f85149";
    };
</script>
</body>
</html>
